<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auth System</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="auth-container">
        <h2 id="form-title">AUTHENTICATION</h2>
        <input type="text" id="user-login" placeholder="Username">
        <input type="password" id="user-pass" placeholder="Password">
        
        <div class="buttons">
            <button id="btn-login" onclick="login()">Login</button>
            <button id="btn-register" onclick="register()">Register</button>
        </div>
        
        <p id="status-message"></p>
    </div>

    <div id="success-screen" class="hidden">
        <h2>ACCESS GRANTED</h2>
        <img src="squid-game-squid-game-3.gif" alt="Success">
    </div>

    <script src="script.js"></script>

</body>
</html>
